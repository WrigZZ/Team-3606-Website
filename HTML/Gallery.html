  <!-- ==================== SLIDESHOW MODAL ==================== -->
  <!-- Hidden by default. Gallery.js adds class "open" when a year card is clicked. -->
  <div class="slideshow-modal" id="slideshow-modal">
    <div class="modal-inner">

      <!-- Top bar: year label on the left, close button on the right -->
      <div class="modal-topbar">
        <p class="modal-year" id="modal-year"></p>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>

      <!-- The slide image -->
      <div class="modal-img-wrap">
        <img class="modal-img" id="modal-img" src="" alt="slide">
      </div>

      <!-- Caption and counter below the image -->
      <div class="modal-info">
        <p class="modal-title" id="modal-title"></p>
        </div>
        <div>
        <p class="modal-counter" id="modal-counter"></p>
      </div>

      <!-- Prev / Next navigation -->
      <div class="modal-controls">
        <button class="modal-nav" id="modal-prev">&larr;</button>
        <button class="modal-nav" id="modal-next">&rarr;</button>
      </div>

    </div>
  </div>
  <!-- End slideshow modal -->
